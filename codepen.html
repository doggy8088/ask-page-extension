<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在前往 CodePen - 頁問 AskPage</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: linear-gradient(135deg, #a78bfa, #3b82f6);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 炫麗的背景光暈 */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, rgba(59, 130, 246, 0.05) 50%, transparent 100%);
            top: 20%;
            left: 25%;
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(167, 139, 250, 0.03) 60%, transparent 100%);
            bottom: 15%;
            right: 20%;
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2.5rem;
            border-radius: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-area {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 旋轉的彩虹光環 */
        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 30%, #a78bfa, #3b82f6, transparent 90%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 1.2s linear infinite;
        }

        .loader-ring::after {
            content: '';
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background-color: var(--bg-color);
        }

        .logo-icon {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <div class="loader-ring"></div>
            <div class="logo-icon">C</div>
        </div>
        <h1>正在準備 CodePen 程式碼...</h1>
        <p>即將為您在新視窗開啟編輯器</p>
    </div>

    <!-- 用於 POST 提交表單的隱藏容器 -->
    <div id="form-container" style="display: none;"></div>

    <script src="codepen.js"></script>
</body>
</html>
