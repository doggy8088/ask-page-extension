<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <title>頁問: 偏好設定</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: dark;
      --primary-color: #1687ff;
      --primary-hover: #0068f0;
      --secondary-color: rgba(12, 24, 39, 0.72);
      --border-color: rgba(111, 140, 173, 0.28);
      --text-primary: #edf6ff;
      --text-secondary: #8ea2bc;
      --success-color: #35d07f;
      --danger-color: #ff6b7a;
      --warning-color: #ff9a4a;
      --background: #020612;
      --card-background: rgba(7, 13, 24, 0.92);
      --card-background-strong: rgba(9, 20, 34, 0.96);
      --panel-glow: rgba(22, 135, 255, 0.22);
      --cyan: #75d8ff;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.34), 0 0 0 1px rgba(150, 185, 226, 0.1);
      --shadow-lg: 0 28px 90px rgba(0, 0, 0, 0.52), 0 0 0 1px rgba(117, 216, 255, 0.18);
      --tab-active-bg: rgba(16, 93, 184, 0.72);
      --tab-inactive-bg: rgba(7, 17, 31, 0.76);
      --font-ui: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      --font-code: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at 18% 8%, rgba(22, 135, 255, 0.28), transparent 28rem),
        radial-gradient(circle at 82% 4%, rgba(117, 216, 255, 0.14), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(0, 104, 240, 0.16), transparent 34rem),
        var(--background);
      color: var(--text-primary);
      line-height: 1.45;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: '';
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.88), transparent 78%);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 20px 24px;
    }

    .header {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 18px;
      align-items: center;
      margin-bottom: 16px;
      padding: 16px 20px;
      border: 1px solid rgba(133, 164, 202, 0.26);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 12% 0%, rgba(22, 135, 255, 0.24), transparent 34%),
        linear-gradient(145deg, rgba(7, 13, 24, 0.96), #020612 72%);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .header::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: '';
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.032) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.74), transparent 82%);
    }

    .header::after {
      position: absolute;
      right: 28px;
      bottom: 0;
      left: 28px;
      height: 1px;
      content: '';
      background: linear-gradient(90deg, transparent, rgba(38, 151, 255, 0.78), transparent);
    }

    .header h1 {
      position: relative;
      grid-column: 1;
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      text-shadow: 0 0 24px rgba(100, 181, 255, 0.22);
    }

    .header p {
      position: relative;
      grid-column: 1;
      margin: 4px 0 0 48px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .header .button-group {
      position: relative;
      grid-column: 2;
      grid-row: 1 / 3;
      justify-content: flex-end;
      align-self: center;
      margin-top: 0;
    }

    .header .button-group button {
      min-width: 58px;
      padding: 9px 13px;
    }

    .header .icon {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(53, 208, 127, 0.36));
    }

    .settings-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      background: rgba(5, 13, 24, 0.76);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 4px;
      box-shadow: var(--shadow);
      gap: 6px;
      backdrop-filter: blur(18px) saturate(1.15);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 18px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn:hover {
      background: rgba(13, 27, 43, 0.78);
      border-color: rgba(128, 194, 255, 0.44);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.24), transparent 28%),
        linear-gradient(180deg, rgba(31, 130, 255, 0.9), rgba(4, 86, 211, 0.86));
      border-color: rgba(107, 181, 255, 0.86);
      color: #f5fbff;
      box-shadow: 0 0 0 1px rgba(70, 154, 255, 0.2), 0 0 22px rgba(0, 120, 255, 0.28);
    }

    /* Tab content */
    .tab-content {
      margin-top: 12px;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 92% 0%, rgba(22, 135, 255, 0.13), transparent 28%),
        var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color 0.24s ease, box-shadow 0.24s ease, transform 0.24s ease;
    }

    .card:hover {
      border-color: rgba(117, 216, 255, 0.34);
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .card-header {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(107, 136, 171, 0.24);
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-description {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    label {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    input, select, textarea {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid rgba(111, 140, 173, 0.36);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(17, 31, 49, 0.88), rgba(8, 17, 30, 0.88));
      color: var(--text-primary);
      caret-color: var(--cyan);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      outline: none;
      font-family: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    textarea {
      resize: vertical;
      min-height: 84px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(117, 216, 255, 0.68);
      background: rgba(12, 25, 43, 0.96);
      box-shadow: 0 0 0 4px rgba(22, 135, 255, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    input:hover, select:hover, textarea:hover {
      border-color: var(--primary-color);
    }

    .input-error,
    .input-error:hover,
    .input-error:focus {
      border-color: var(--danger-color);
      box-shadow: 0 0 0 4px rgba(255, 107, 122, 0.14);
    }

    .field-error {
      display: block;
      min-height: 16px;
      color: var(--danger-color);
      font-size: 12px;
      font-weight: 500;
      margin-top: 4px;
    }

    .provider-settings {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      background: rgba(9, 23, 41, 0.62);
      border-radius: 16px;
      border: 1px solid var(--border-color);
    }

    .provider-settings .form-group {
      margin-bottom: 0;
    }

    #provider-tab .card {
      display: grid;
      grid-template-columns: minmax(220px, 0.7fr) minmax(0, 2fr);
      gap: 14px;
      align-items: start;
    }

    #provider-tab .card-header {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    #provider-tab .card > .form-group {
      margin-bottom: 0;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      background: rgba(9, 23, 41, 0.48);
    }

    /* Custom Commands */
    .commands-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .command-item {
      background:
        linear-gradient(180deg, rgba(18, 35, 55, 0.9), rgba(8, 17, 30, 0.9)),
        radial-gradient(circle at 0% 0%, rgba(117, 216, 255, 0.1), transparent 32%);
      border: 1px solid var(--border-color);
      border-left: 1px solid rgba(117, 216, 255, 0.48);
      border-radius: 16px;
      padding: 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .command-item:hover {
      border-color: var(--primary-color);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .command-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 12px;
    }

    .command-name {
      font-weight: 600;
      color: var(--cyan);
      font-size: 15px;
      font-family: var(--font-code);
    }

    .command-actions {
      display: flex;
      gap: 8px;
    }

    .built-in-badge {
      background: rgba(255, 154, 74, 0.16);
      color: #ffd5ad;
      padding: 3px 8px;
      border: 1px solid rgba(255, 154, 74, 0.32);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .add-command {
      border: 1px dashed rgba(117, 216, 255, 0.36);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
    }

    .add-command:hover {
      border-color: rgba(117, 216, 255, 0.68);
      background: rgba(15, 52, 92, 0.42);
    }

    .add-command-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
    }

    .add-command-icon {
      font-size: 20px;
      color: var(--cyan);
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      border: 1px solid transparent;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease, border-color 0.16s ease, background 0.16s ease;
      box-shadow: var(--shadow);
      min-width: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background:
        radial-gradient(circle at 35% 20%, rgba(255, 255, 255, 0.42), transparent 24%),
        linear-gradient(145deg, var(--primary-color), var(--primary-hover));
      color: white;
      border-color: rgba(107, 181, 255, 0.88);
      box-shadow: 0 12px 28px rgba(0, 104, 240, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .btn-primary:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
      filter: saturate(1.1) brightness(1.05);
    }

    .btn-secondary {
      background: rgba(7, 17, 31, 0.76);
      color: #d9e5f2;
      border: 1px solid rgba(107, 136, 171, 0.48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 1px 2px rgba(0, 0, 0, 0.28);
    }

    .btn-secondary:hover {
      background: rgba(12, 60, 118, 0.55);
      border-color: rgba(128, 194, 255, 0.84);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: linear-gradient(180deg, rgba(255, 107, 122, 0.9), rgba(198, 42, 63, 0.9));
      color: white;
      border-color: rgba(255, 139, 153, 0.56);
    }

    .btn-danger:hover {
      background: linear-gradient(180deg, rgba(255, 126, 139, 0.95), rgba(198, 42, 63, 0.95));
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      min-width: auto;
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      font-size: 14px;
      min-height: 18px;
      text-align: center;
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 12px;
      margin-top: 10px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .status:not(:empty) {
      opacity: 1;
      visibility: visible;
    }

    .status.success {
      color: var(--success-color);
      background: rgba(53, 208, 127, 0.12);
      border: 1px solid rgba(53, 208, 127, 0.28);
    }

    .status.error {
      color: var(--danger-color);
      background: rgba(255, 107, 122, 0.12);
      border: 1px solid rgba(255, 107, 122, 0.28);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        display: block;
        padding: 14px;
      }

      .header p {
        margin-left: 0;
      }

      .header h1 {
        font-size: 24px;
      }

      .header .button-group {
        justify-content: flex-start;
        margin-top: 12px;
      }

      .tab-btn {
        padding: 9px 12px;
        font-size: 14px;
      }

      .card {
        padding: 14px;
      }

      #provider-tab .card {
        display: block;
      }

      #provider-tab .card > .form-group {
        margin-bottom: 12px;
      }

      .command-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .command-actions {
        align-self: flex-end;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(54, 151, 255, 0.68);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    .icon {
      font-style: normal;
    }

    .footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid rgba(107, 136, 171, 0.24);
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    #commandModal {
      background: rgba(2, 6, 18, 0.76) !important;
      backdrop-filter: blur(12px) saturate(1.15);
    }

    #commandModal > div {
      border: 1px solid rgba(133, 164, 202, 0.26);
      border-radius: 24px !important;
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <img class="icon" src="icons/askpage-mark.png" alt="" aria-hidden="true">
        頁問: 偏好設定
      </h1>
      <p>設定您的 AI 提供者和自訂斜線命令</p>
      <div class="button-group">
        <button id="save" class="btn-primary">💾 儲存</button>
        <button id="reset" class="btn-secondary">🔄 重置</button>
        <button id="export" class="btn-secondary">📤 匯出</button>
        <button id="import" class="btn-secondary">📥 匯入</button>
        <input type="file" id="importFile" accept=".json" style="display: none;">
      </div>
    </div>

    <div class="settings-content">
      <!-- Tab Navigation -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="provider">
          <span class="icon">🤖</span>
          AI 提供者
        </button>
        <button class="tab-btn" data-tab="commands">
          <span class="icon">⚡</span>
          自訂斜線命令
        </button>
      </div>

      <!-- Tab Content -->
      <div class="tab-content">
        <!-- AI Provider Tab -->
        <div id="provider-tab" class="tab-pane active">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">
                <span class="icon">🔧</span>
                AI 提供者設定
              </h2>
              <p class="card-description">選擇您偏好的 AI 提供者並設定相關參數</p>
            </div>

            <div class="form-group">
              <label for="providerSelect">選擇 AI 提供者</label>
              <select id="providerSelect">
                <option value="openai">OpenAI</option>
                <option value="azure">Azure OpenAI</option>
                <option value="gemini">Google Gemini</option>
                <option value="openai-compatible">OpenAI 相容端點</option>
              </select>
            </div>

            <div id="gemini-settings" class="provider-settings">
              <div class="form-row">
                <div class="form-group">
                  <label for="geminiApiKey">Gemini API Key</label>
                  <input id="geminiApiKey" type="password" placeholder="請輸入您的 Gemini API Key">
                </div>
                <div class="form-group">
                  <label for="geminiModelSelect">Gemini 模型</label>
                  <select id="geminiModelSelect">
                    <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                    <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
                    <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                    <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
                    <option value="gemini-flash-lite-latest">gemini-flash-lite-latest</option>
                  </select>
                </div>
              </div>
            </div>

            <div id="openai-settings" class="provider-settings" style="display: none;">
              <div class="form-row">
                <div class="form-group">
                  <label for="openaiApiKey">OpenAI API Key</label>
                  <input id="openaiApiKey" type="password" placeholder="請輸入您的 OpenAI API Key">
                </div>
                <div class="form-group">
                  <label for="openaiModelSelect">OpenAI 模型</label>
                  <select id="openaiModelSelect">
                    <option value="gpt-5.5">gpt-5.5</option>
                    <option value="gpt-5.4">gpt-5.4</option>
                    <option value="gpt-5.3">gpt-5.3</option>
                    <option value="gpt-5.2">gpt-5.2</option>
                    <option value="gpt-5.1">gpt-5.1</option>
                    <option value="gpt-5">gpt-5</option>
                    <option value="gpt-5-chat-latest">gpt-5-chat-latest</option>
                    <option value="gpt-5-mini">gpt-5-mini</option>
                    <option value="gpt-5-nano">gpt-5-nano</option>
                    <option value="gpt-4o">gpt-4o</option>
                    <option value="gpt-4o-mini">gpt-4o-mini</option>
                    <option value="gpt-4.1">gpt-4.1</option>
                    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                    <option value="o4-mini">o4-mini</option>
                    <option value="o3">o3</option>
                    <option value="o3-mini">o3-mini</option>
                    <option value="o3-pro">o3-pro</option>
                  </select>
                </div>
              </div>
            </div>

            <div id="azure-settings" class="provider-settings" style="display: none;">
              <div class="form-row">
                <div class="form-group">
                  <label for="azureApiKey">Azure OpenAI API Key</label>
                  <input id="azureApiKey" type="password" placeholder="請輸入您的 Azure OpenAI API Key">
                </div>
                <div class="form-group">
                  <label for="azureEndpoint">Azure OpenAI Endpoint</label>
                  <input id="azureEndpoint" type="text" placeholder="例如: https://your-resource.openai.azure.com">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="azureDeployment">Deployment Name</label>
                  <input id="azureDeployment" type="text" placeholder="例如: gpt-4o-mini">
                </div>
                <div class="form-group">
                  <label for="azureApiVersion">API Version</label>
                  <select id="azureApiVersion">
                    <option value="2024-10-21">2024-10-21</option>
                    <option value="2024-12-01-preview">2024-12-01-preview</option>
                    <option value="2025-01-01-preview">2025-01-01-preview</option>
                    <option value="2025-02-01-preview">2025-02-01-preview</option>
                    <option value="2025-03-01-preview">2025-03-01-preview</option>
                    <option value="2025-04-01-preview">2025-04-01-preview</option>
                  </select>
                </div>
              </div>
            </div>

            <div id="openai-compatible-settings" class="provider-settings" style="display: none;">
              <div class="form-row">
                <div class="form-group">
                  <label for="openaiCompatibleEndpoint">API Endpoint</label>
                  <input id="openaiCompatibleEndpoint" type="text" placeholder="例如: http://localhost:11434/v1">
                </div>
                <div class="form-group">
                  <label for="openaiCompatibleApiKey">API Key (選填)</label>
                  <input id="openaiCompatibleApiKey" type="password" placeholder="若不需要可留空">
                </div>
              </div>
              <div class="form-group">
                <label for="openaiCompatibleModel">模型名稱</label>
                <input id="openaiCompatibleModel" type="text" placeholder="例如: llama3, mistral">
              </div>
            </div>
          </div>
        </div>

        <!-- Custom Commands Tab -->
        <div id="commands-tab" class="tab-pane">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">
                <span class="icon">⚡</span>
                斜線命令管理
              </h2>
              <p class="card-description">管理內建和自訂的斜線命令</p>
            </div>

            <div class="commands-list" id="commandsList">
              <!-- Built-in commands will be loaded here -->
              <!-- Custom commands will be loaded here -->
            </div>

            <div class="add-command" id="addCommand">
              <div class="add-command-content">
                <div class="add-command-icon">➕</div>
                <div>新增自訂斜線命令</div>
                <small>點擊新增您專屬的斜線命令</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="status" class="status"></div>

      <footer class="footer">
        <p>© 2026 本工具由 <a href="https://www.facebook.com/will.fans/" target="_blank">Will 保哥的技術交流中心</a> 設計、開發與維護 v<span id="appVersion"></span></p>
      </footer>
    </div>
  </div>

  <!-- Command Edit Modal -->
  <div id="commandModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; padding: 20px;">
    <div style="max-width: 600px; margin: 50px auto; background: var(--card-background); border-radius: 16px; padding: 24px; max-height: 80vh; overflow-y: auto;">
      <h3 id="modalTitle" style="margin: 0 0 20px; color: var(--text-primary);">編輯斜線命令</h3>

      <div class="form-group">
        <label for="modalCommandName">命令名稱</label>
        <input id="modalCommandName" type="text" placeholder="例如：/help" pattern="^/[a-zA-Z0-9_\-]+$" aria-describedby="modalCommandNameError">
        <small id="modalCommandNameError" class="field-error"></small>
        <small style="color: var(--text-secondary);">命令必須以 / 開頭，只能包含字母、數字、底線和連字符</small>
      </div>

      <div class="form-group">
        <label for="modalCommandPrompt">提示內容</label>
        <textarea id="modalCommandPrompt" placeholder="請輸入當使用者執行此命令時要傳送給 AI 的提示內容..."></textarea>
      </div>

      <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
        <button id="modalCancel" class="btn-secondary">取消</button>
        <button id="modalSave" class="btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
