<!DOCTYPE html>
<html>
<head>
  <title>頁問: 設定已移轉</title>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --background-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: rgba(226, 232, 240, 0.8);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --glow: rgba(99, 102, 241, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary-color: #8b5cf6;
        --primary-hover: #7c3aed;
        --background-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(51, 65, 85, 0.8);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        --glow: rgba(139, 92, 246, 0.25);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background-gradient);
      overflow: hidden;
    }

    .container {
      width: 90%;
      padding: 24px;
      border-radius: 16px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Decorative glow */
    .container::before {
      content: '';
      position: absolute;
      top: -10%;
      left: -10%;
      right: -10%;
      bottom: -10%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      z-index: -1;
      border-radius: 24px;
      pointer-events: none;
    }

    .logo-container {
      width: 54px;
      height: 54px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
      border-radius: 12px;
      box-shadow: 0 8px 16px -4px var(--glow);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--glow);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--glow);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px var(--glow);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="icons/icon128.png" alt="AskPage Logo" class="logo-icon" id="logo">
    </div>
    <h1>頁問 AskPage</h1>
    <p>設定已升級至支援多模型設定，即將為您跳轉至完整設定頁面...</p>
    <button id="open-settings" class="btn">
      <div class="spinner"></div>
      開啟設定頁面
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
